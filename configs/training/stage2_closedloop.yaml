# configs/training/stage2_closedloop.yaml
# Stage 2: Closed-loop simulation fine-tuning

stage: 2
description: "Fine-tune with closed-loop simulation rollouts"

max_epochs: 5
warmup_steps: 200
batch_size: 4
gradient_clip: 0.5
accumulate_grad_batches: 8

optimizer:
  _target_: torch.optim.AdamW
  lr: 3.0e-5
  weight_decay: 0.01

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 200
  num_training_steps: 20000

loss_weights:
  lambda_task: 1.0
  lambda_causal: 0.5
  lambda_counterfactual: 0.3
  lambda_uncertainty: 0.1

sim:
  env: "physicalai"             # "physicalai" | "nuplan" | "carla"
  rollout_length: 80            # timesteps per simulation episode
  num_parallel_envs: 4
  reset_strategy: "uniform"

freeze_backbone: true           # freeze encoder, only train SCM + policy
lora_rank: 8
