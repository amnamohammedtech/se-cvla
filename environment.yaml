name: se-cvla
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip

  # PyTorch (CUDA 12.1)
  - pytorch>=2.3.0
  - torchvision>=0.18.0
  - pytorch-cuda=12.1
  - cudatoolkit=12.1

  - pip:
    # Install the rest via pip (same as pyproject.toml)
    - einops>=0.7.0
    - timm>=1.0.0
    - transformers>=4.40.0
    - accelerate>=0.30.0
    - peft>=0.10.0
    - torch-geometric>=2.5.0
    - networkx>=3.3
    - pgmpy>=0.1.25
    - dowhy>=0.11
    - diffusers>=0.27.0
    - uncertainty-toolbox>=0.1.1
    - datasets>=2.19.0
    - huggingface-hub>=0.23.0
    - pytorch-lightning>=2.2.0
    - hydra-core>=1.3.2
    - omegaconf>=2.3.0
    - wandb>=0.17.0
    - tensorboard>=2.17.0
    - scikit-learn>=1.5.0
    - scipy>=1.13.0
    - pandas>=2.2.0
    - numpy>=1.26.0
    - matplotlib>=3.9.0
    - seaborn>=0.13.0
    - plotly>=5.22.0
    - pyvis>=0.3.2
    - gymnasium>=0.29.0
    - flash-attn>=2.5.0
    - tqdm>=4.66.0
    - rich>=13.7.0
    - pydantic>=2.7.0
    - pytest>=8.2.0
    - pytest-cov>=5.0.0
    - ruff
    - mypy
    - ipykernel
    - jupyter
